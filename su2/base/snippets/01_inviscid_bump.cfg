%
% Step 1: Inviscid Euler flow over a 2D channel bump (verified E2E)
% Source: SU2 Tutorials/compressible_flow/Inviscid_Bump
%
% Acceptance: after 100 iters, RMS[Rho] < -2 (≥ 1 order drop from -1.4)
% Observed: RMS[Rho] = -4.91 at iter 100 (3.5 order drop)
% Runtime: ~60s on serial build, 256x128 mesh
%
% Required sibling file: mesh_channel_256x128.su2
%   Copy from /data/Chenyx/sim/refs/Tutorials/compressible_flow/Inviscid_Bump/
%
% Run: sim run 01_inviscid_bump.cfg --solver su2
%
SOLVER= EULER
MATH_PROBLEM= DIRECT
RESTART_SOL= NO

MACH_NUMBER= 0.5
AOA= 0.0
FREESTREAM_TEMPERATURE= 288.6
FREESTREAM_PRESSURE= 101300.0

MESH_FILENAME= mesh_channel_256x128.su2
MESH_FORMAT= SU2

MARKER_EULER= ( upper_wall, lower_wall )
MARKER_INLET= ( inlet, 288.6, 102010.0, 1.0, 0.0, 0.0 )
MARKER_OUTLET= ( outlet, 101300.0 )
MARKER_MONITORING= ( lower_wall )
MARKER_PLOTTING= ( lower_wall )

ITER= 100
CFL_NUMBER= 4.0
CFL_ADAPT= NO

CONV_FIELD= RMS_DENSITY
CONV_RESIDUAL_MINVAL= -8

OUTPUT_FILES= ( RESTART, PARAVIEW, SURFACE_PARAVIEW )
SCREEN_OUTPUT= ( INNER_ITER, RMS_DENSITY )
